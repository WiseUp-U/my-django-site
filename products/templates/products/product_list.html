<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE }}">
{% load static %}
{% load i18n %}
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tractor UI</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- 🔥 SAFE TRANSITION OVERLAY -->
<div id="transition-overlay"></div>

<div class="hero">

    <div class="hero-overlay"></div>
    <div class="dust-container"></div>

    <div class="hero-content">

        <div class="carousel">

            <!-- CARD -->
            <div class="carousel-card">
                <div class="card-name">TRACTOR X</div>

                <div class="card-info">
                    <div class="carousel-image-wrapper">
                        <img src="https://via.placeholder.com/300">
                    </div>
                    <div class="card-year">2024</div>
                </div>

                <a href="#">
                    <div class="detail-btn">
                        <span>DETAIL</span>
                    </div>
                </a>
            </div>

            <div class="carousel-card">
                <div class="card-name">TRACTOR Z</div>

                <div class="card-info">
                    <div class="carousel-image-wrapper">
                        <img src="https://via.placeholder.com/300">
                    </div>
                    <div class="card-year">2023</div>
                </div>

                <a href="#">
                    <div class="detail-btn">
                        <span>DETAIL</span>
                    </div>
                </a>
            </div>

        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const carousel = document.querySelector(".carousel");
const cards = document.querySelectorAll(".carousel-card");

/* 🎯 ACTIVE CARD */
function updateActiveCard() {
    let center = carousel.scrollLeft + carousel.offsetWidth / 2;

    let closest = null;
    let min = Infinity;

    cards.forEach(card => {
        let cardCenter = card.offsetLeft + card.offsetWidth / 2;
        let dist = Math.abs(center - cardCenter);

        if (dist < min) {
            min = dist;
            closest = card;
        }
    });

    cards.forEach(c => c.classList.remove("active"));
    if (closest) closest.classList.add("active");
}

/* 🎯 SNAP */
function snapToCenter() {
    const active = document.querySelector(".carousel-card.active");
    if (!active) return;

    const left = active.offsetLeft - (carousel.offsetWidth / 2) + (active.offsetWidth / 2);

    carousel.scrollTo({ left, behavior: "smooth" });
}

let timeout;

carousel.addEventListener("scroll", () => {
    updateActiveCard();

    clearTimeout(timeout);
    timeout = setTimeout(snapToCenter, 100);
});

/* 🖱 DESKTOP DRAG */
let isDown = false;
let startX;
let scrollLeft;

carousel.addEventListener("mousedown", e => {
    isDown = true;
    startX = e.pageX - carousel.offsetLeft;
    scrollLeft = carousel.scrollLeft;
});

carousel.addEventListener("mouseleave", () => isDown = false);
carousel.addEventListener("mouseup", () => isDown = false);

carousel.addEventListener("mousemove", e => {
    if (!isDown) return;
    e.preventDefault();

    const x = e.pageX - carousel.offsetLeft;
    const walk = (x - startX) * 2;

    carousel.scrollLeft = scrollLeft - walk;
});

/* 🌾 DUST */
const dustContainer = document.querySelector(".dust-container");

function createDust(x, y) {
    const d = document.createElement("div");
    d.className = "dust";

    d.style.left = x + "px";
    d.style.top = y + "px";

    dustContainer.appendChild(d);

    setTimeout(() => d.remove(), 1000);
}

let scrolling = false;

carousel.addEventListener("scroll", () => {
    if (!scrolling) {
        scrolling = true;

        for (let i = 0; i < 4; i++) {
            createDust(
                window.innerWidth/2 + (Math.random()-0.5)*200,
                window.innerHeight*0.75
            );
        }

        setTimeout(() => scrolling = false, 120);
    }
});

/* 🔥 SAFE TRANSITION */
const overlay = document.getElementById("transition-overlay");

window.addEventListener("load", () => {
    overlay.classList.add("hidden");
});

});
</script>

</body>
</html>
