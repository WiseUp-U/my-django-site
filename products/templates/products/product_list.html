<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE }}">
{% load static %}
{% load i18n %}
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=10">
</head>

<body>

<!-- 🔥 Page transition -->
<div id="transition-overlay"></div>

<div class="hero">

    <div class="hero-overlay"></div>
    <div class="dust-container"></div>

    <div class="hero-content">

        <!-- Language -->
        <form action="/i18n/setlang/" method="post">
            {% csrf_token %}
            <button name="language" value="en">EN</button>
            <button name="language" value="my">မြန်မာ</button>
        </form>

        <!-- Carousel -->
        <div class="carousel">

            {% for product in products %}
            <div class="carousel-card">

                <div class="card-name">{{ product.name }}</div>

                <div class="card-info">
                    <div class="carousel-image-wrapper">
                        <img src="{{ product.image.url }}" loading="lazy">
                    </div>
                    <div class="card-year">{{ product.year }}</div>
                </div>

                <a href="{% url 'product_detail' product.id %}">
                    <div class="detail-btn">
                        <span class="btn-next">{% trans "Detail" %}</span>
                    </div>
                </a>

            </div>
            {% endfor %}

        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const carousel = document.querySelector(".carousel");
    const cards = document.querySelectorAll(".carousel-card");

    function updateActiveCard() {
        let center = carousel.scrollLeft + carousel.offsetWidth / 2;

        let closestCard = null;
        let closestDistance = Infinity;

        cards.forEach(card => {
            let cardCenter = card.offsetLeft + card.offsetWidth / 2;
            let distance = Math.abs(center - cardCenter);

            if (distance < closestDistance) {
                closestDistance = distance;
                closestCard = card;
            }
        });

        cards.forEach(card => card.classList.remove("active"));
        if (closestCard) closestCard.classList.add("active");
    }

    function snapToCenter() {
        const active = document.querySelector(".carousel-card.active");
        if (!active) return;

        const scrollTo = active.offsetLeft - (carousel.offsetWidth / 2) + (active.offsetWidth / 2);

        carousel.scrollTo({
            left: scrollTo,
            behavior: "smooth"
        });
    }

    let scrollTimeout;

    carousel.addEventListener("scroll", () => {
        updateActiveCard();

        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(snapToCenter, 100);
    });

    updateActiveCard();
    snapToCenter();

    /* 🌾 Dust particles */
    const dustContainer = document.querySelector(".dust-container");

    function createDust(x, y) {
        const dust = document.createElement("div");
        dust.classList.add("dust");

        const offsetX = (Math.random() - 0.5) * 60;

        dust.style.left = x + "px";
        dust.style.top = y + "px";
        dust.style.setProperty("--x", offsetX + "px");

        dustContainer.appendChild(dust);

        setTimeout(() => dust.remove(), 1200);
    }

    let isScrolling = false;

    carousel.addEventListener("scroll", () => {
        if (!isScrolling) {
            isScrolling = true;

            for (let i = 0; i < 5; i++) {
                const x = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
                const y = window.innerHeight * 0.75;

                createDust(x, y);
            }

            setTimeout(() => isScrolling = false, 150);
        }
    });

    /* 🔥 Page transition */
    const overlay = document.getElementById("transition-overlay");

    window.addEventListener("pageshow", () => {
        document.body.classList.add("page-visible");
        setTimeout(() => overlay.classList.add("hidden"), 100);
    });

    document.querySelectorAll("a[href]").forEach(link => {
        if (link.hostname !== window.location.hostname) return;

        link.addEventListener("click", e => {
            e.preventDefault();

            overlay.classList.remove("hidden");
            document.body.classList.remove("page-visible");

            setTimeout(() => {
                window.location.href = link.href;
            }, 400);
        });
    });

});
</script>

</body>
</html>
