<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE }}">
{% load static %}
{% load i18n %}
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tractor UI</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- 🔥 SAFE TRANSITION OVERLAY -->
<div id="transition-overlay"></div>

<div class="hero">

    <div class="hero-overlay"></div>
    <div class="dust-container"></div>
    <div class="ground-line"></div>

    <div class="hero-content">
         <!-- Language -->
        <form action="/i18n/setlang/" method="post">
            {% csrf_token %}
            <button name="language" value="en">EN</button>
            <button name="language" value="my">မြန်မာ</button>
        </form>

        <div class="carousel">

            <!-- CARD -->
            {% for product in products %}
            <div class="carousel-card">
                <div class="card-name">{{ product.name }}</div>

                <div class="card-info">
                    <div class="carousel-image-wrapper">
                        <img src="{{ product.image.url }}" loading="lazy">
                    </div>
                </div>

                <a href="{% url 'product_detail' product.id %}">
                    <div class="detail-btn">
                        <span class="btn-next">{% trans "Detail" %}</span>
                    </div>
                </a>
            </div>
            {% endfor %}

        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const carousel = document.querySelector(".carousel");
const cards = document.querySelectorAll(".carousel-card");

/* 🎯 ACTIVE CARD */
function updateActiveCard() {
    let center = carousel.scrollLeft + carousel.offsetWidth / 2;

    let closest = null;
    let min = Infinity;

    cards.forEach(card => {
        let cardCenter = card.offsetLeft + card.offsetWidth / 2;
        let dist = Math.abs(center - cardCenter);

        if (dist < min) {
            min = dist;
            closest = card;
        }
    });

    cards.forEach(c => c.classList.remove("active"));
    if (closest) closest.classList.add("active");
}

/* 🎯 SNAP */
function snapToCenter() {
    const active = document.querySelector(".carousel-card.active");
    if (!active) return;

    const left = active.offsetLeft - (carousel.offsetWidth / 2) + (active.offsetWidth / 2);

    carousel.scrollTo({ left, behavior: "smooth" });
}


/* 🖱 DESKTOP DRAG */
let isDown = false;
let startX;
let scrollLeft;

carousel.addEventListener("mousedown", e => {
    isDown = true;
    startX = e.pageX - carousel.offsetLeft;
    scrollLeft = carousel.scrollLeft;
});

carousel.addEventListener("mouseleave", () => isDown = false);
carousel.addEventListener("mouseup", () => isDown = false);

carousel.addEventListener("mousemove", e => {
    if (!isDown) return;
    e.preventDefault();

    const x = e.pageX - carousel.offsetLeft;
    const walk = (x - startX) * 2;

    carousel.scrollLeft = scrollLeft - walk;
});

/* 🌾 DUST */
let lastDust = 0;

function createDust() {
    if(Date.now() - lastDust < 50) return;
    lastDust = Date.now();

    const active = document.querySelector(".carousel-card.active");
    if (!active) return;

    const  rect = active.getBoundingClientRect();
    const groundY = ground.offsetTop;

    for (let i = 0; i < 6; i++) {
        const d = document.createElement("div");
        d.className = "dust";

        d.style.left = rect.left + rect.width / 2 + "px";
        d.style.top = groundY + "px";

        d.style.setProperty("--x", (Math.random() - 0.5) * 120 + "px");
        d.style.setProperty("--y", -Math.random() * 100 + "px");

        dustContainer.appendChild(d);

        setTimeout(() => d.remove(), 1000);
    }
}

carousel.addEventListener("scroll", () => {
    updateActiveCard();
    createDust();
});

let timeout;
carousel.addEventListener("scroll", () => {
    clearTimeout(timeout);
    timeout = setTimeout(snapToCenter, 120);
});

window.addEventListener("load", () => {
    updateActiveCard();
});



/* 🔥 SAFE TRANSITION */
const overlay = document.getElementById("transition-overlay");

window.addEventListener("load", () => {
    overlay.classList.add("hidden");
});

});
</script>

</body>
</html>
