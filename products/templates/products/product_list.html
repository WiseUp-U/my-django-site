<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE }}">
{% load static %}
{% load i18n %}
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- preload font -->
    <link rel="preload" href="{% static 'fonts/Bungee-Regular.ttf' %}" as="font" type="font/ttf" crossorigin>
</head>

<body>

<div class="hero-section">
    <form action="/i18n/setlang/" method="post">
        {% csrf_token %}
        <button name="language" value="en">English</button>
        <button name="language" value="my">မြန်မာ</button>
    </form>
</div>

<!-- 🔥 NEW CAROUSEL -->
<div class="carousel">

    {% for product in products %}
        <div class="carousel-card">

            <div class="card-name">{{ product.name }}</div>

            <div class="card-info">
                <div class="carousel-image-wrapper">
                    <img 
                        src="{{ product.image.url }}" 
                        loading="lazy"
                        width="300"
                        height="300"
                    >
                </div>
                <div class="card-year">{{ product.year }}</div>
            </div>

            <a href="{% url 'product_detail' product.id %}">
                <h3 class="detail-btn">
                    <span class="btn-bg"></span>
                    <span class="btn-next">{% trans "Detail" %}</span>
                </h3>
            </a>

        </div>
    {% endfor %}

</div>

<!-- 🔥 AUTO CENTER SCRIPT -->
<script>
const carousel = document.querySelector(".carousel");
const cards = document.querySelectorAll(".carousel-card");

function updateActiveCard() {
    let center = carousel.scrollLeft + carousel.offsetWidth / 2;

    let closestCard = null;
    let closestDistance = Infinity;

    cards.forEach(card => {
        let cardCenter = card.offsetLeft + card.offsetWidth / 2;
        let distance = Math.abs(center - cardCenter);

        if (distance < closestDistance) {
            closestDistance = distance;
            closestCard = card;
        }
    });

    cards.forEach(card => card.classList.remove("active"));
    if (closestCard) closestCard.classList.add("active");
}

function snapToCenter() {
    const active = document.querySelector(".carousel-card.active");
    if (!active) return;

    const left = active.offsetLeft;
    const width = active.offsetWidth;

    const scrollTo = left - (carousel.offsetWidth / 2) + (width / 2);

    carousel.scrollTo({
        left: scrollTo,
        behavior: "smooth"
    });
}

let scrollTimeout;

carousel.addEventListener("scroll", () => {
    updateActiveCard();

    clearTimeout(scrollTimeout);

    scrollTimeout = setTimeout(() => {
        snapToCenter();
    }, 100);
});

window.addEventListener("load", () => {
    updateActiveCard();
    snapToCenter();
});
</script>

</body>
</html>
